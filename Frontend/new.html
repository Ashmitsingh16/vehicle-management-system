<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #map {
            height: 400px;
            width: 100%;
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .location-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        button {
            padding: 8px 15px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background: #3367d6;
        }
    </style>
</head>
<body>
    <h1>Location Tracker</h1>
    
    <div class="location-info">
        <h3>Current Location</h3>
        <p><strong>Address:</strong> <span id="currentLocation">Getting location...</span></p>
        <p><strong>Coordinates:</strong> <span id="currentCoords">-</span></p>
        <p><strong>Last Updated:</strong> <span id="lastUpdated">Never</span></p>
    </div>
    
    <div>
        <button onclick="getCurrentLocation()">Update Location</button>
        <button onclick="startTracking()">Start Tracking</button>
        <button onclick="stopTracking()">Stop Tracking</button>
    </div>
    
    <div id="map"></div>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAt_l-CK_Rgdq3YZvYk8g2i3lqkjn457R0&libraries=places"></script>
    <script>
        let map;
        let marker;
        let trackingInterval;
        
        // Initialize the map
        function initMap(lat = 0, lng = 0) {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat, lng },
                zoom: 15
            });
        }
        
        // Get current location
        function getCurrentLocation() {
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser");
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    // Update map
                    if (!map) initMap(lat, lng);
                    map.setCenter({ lat, lng });
                    
                    // Update marker
                    if (marker) marker.setMap(null);
                    marker = new google.maps.Marker({
                        position: { lat, lng },
                        map: map,
                        title: "Your Location"
                    });
                    
                    // Get address
                    getAddress(lat, lng);
                    
                    // Update timestamp
                    document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
                },
                (error) => {
                    console.error("Error getting location:", error);
                    alert("Error getting location: " + error.message);
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }
        
        // Get address from coordinates
        function getAddress(lat, lng) {
            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ location: { lat, lng } }, (results, status) => {
                if (status === 'OK' && results[0]) {
                    const address = results[0].formatted_address;
                    document.getElementById('currentLocation').textContent = address;
                    document.getElementById('currentCoords').textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                } else {
                    document.getElementById('currentLocation').textContent = "Address not available";
                    document.getElementById('currentCoords').textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                }
            });
        }
        
        // Start continuous tracking
        function startTracking() {
            if (!trackingInterval) {
                getCurrentLocation(); // Get immediately
                trackingInterval = setInterval(getCurrentLocation, 5000); // Then every 5 seconds
                alert("Tracking started - updating every 5 seconds");
            } else {
                alert("Tracking is already active");
            }
        }
        
        // Stop tracking
        function stopTracking() {
            if (trackingInterval) {
                clearInterval(trackingInterval);
                trackingInterval = null;
                alert("Tracking stopped");
            } else {
                alert("No active tracking to stop");
            }
        }
        
        // Initialize with default map
        window.onload = function() {
            initMap();
        };
    </script>
</body>
</html>
